<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DynaMaze Docs</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  padding: 40px;
}

h1 {
  text-align: center;
}

ul {
  list-style: none;
  padding-left: 20px;
}

li {
  margin: 5px 0;
}

a {
  color: #58a6ff;
  text-decoration: none;
}

.folder {
  cursor: pointer;
  font-weight: bold;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>DynaMaze Documentation 🚀</h1>
<div id="tree"></div>

<script>

//made with LLM

const owner = "DynaMaze305";
const repo = "cycle_hunters";
const branch = "main";
const basePath = "docs";

async function fetchTree() {
  const res = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`
  );
  const data = await res.json();
  return data.tree.filter(item => item.path.startsWith(basePath));
}

function buildStructure(files) {
  const root = {};

  files.forEach(file => {
    const parts = file.path.split('/').slice(1); // remove "docs"
    let current = root;

    parts.forEach((part, i) => {
      if (i === parts.length - 1) {
        current[part] = file.path;
      } else {
        current[part] = current[part] || {};
        current = current[part];
      }
    });
  });

  return root;
}

function createTree(obj) {
  const ul = document.createElement('ul');

  for (let key in obj) {
    const li = document.createElement('li');

    if (typeof obj[key] === 'string') {
      const a = document.createElement('a');
      a.href = obj[key];
      a.textContent = "📄 " + key;
      a.target = "_blank";
      li.appendChild(a);
    } else {
      const span = document.createElement('span');
      span.textContent = "📁 " + key;
      span.className = "folder";

      const child = createTree(obj[key]);
      child.classList.add("hidden");

      span.onclick = () => {
        child.classList.toggle("hidden");
      };

      li.appendChild(span);
      li.appendChild(child);
    }

    ul.appendChild(li);
  }

  return ul;
}

async function init() {
  const files = await fetchTree();
  const structure = buildStructure(files);
  document.getElementById("tree").appendChild(createTree(structure));
}

init();
</script>

</body>
</html>
